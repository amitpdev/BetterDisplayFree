<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1C1C30"/>
      <stop offset="100%" stop-color="#12121F"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A3354"/>
      <stop offset="100%" stop-color="#090E1C"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App background -->
  <rect width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Monitor bezel -->
  <rect x="108" y="175" width="808" height="535" rx="42" ry="42" fill="#252538"/>
  <!-- Bezel inner shadow -->
  <rect x="108" y="175" width="808" height="535" rx="42" ry="42"
        fill="none" stroke="#1A1A2E" stroke-width="6" opacity="0.6"/>

  <!-- Screen -->
  <rect x="145" y="213" width="734" height="460" rx="16" ry="16" fill="url(#screenGrad)"/>
  <!-- Screen top shimmer -->
  <rect x="145" y="213" width="734" height="230" rx="16" ry="16" fill="url(#shimmer)"/>

  <!-- Double-headed diagonal arrow (bottom-left → top-right) -->
  <!-- Arrow body -->
  <line x1="283" y1="552" x2="737" y2="308"
        stroke="#4A9EFF" stroke-width="26" stroke-linecap="round"
        filter="url(#glow)"/>

  <!-- Arrowhead at top-right end
       Arrow unit vector: (0.881, -0.472), perp: (0.472, 0.881)
       Tip at (790, 280), base center at (737, 308), half-width 34 -->
  <polygon points="790,280 751,335 737,308 723,281"
           fill="#4A9EFF" filter="url(#glow)"/>

  <!-- Arrowhead at bottom-left end
       Tip at (230, 580), base center at (283, 552), half-width 34 -->
  <polygon points="230,580 297,578 283,552 269,525"
           fill="#4A9EFF" filter="url(#glow)"/>

  <!-- Stand neck -->
  <rect x="462" y="710" width="100" height="88" rx="10" ry="10" fill="#252538"/>

  <!-- Stand base -->
  <rect x="328" y="793" width="368" height="50" rx="25" ry="25" fill="#252538"/>

  <!-- Bottom bezel notch -->
  <rect x="454" y="690" width="116" height="9" rx="4" ry="4" fill="#1A1A2E" opacity="0.7"/>
</svg>
